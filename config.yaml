# RNA-seq Snakemake Workflow Configuration

# Sample information
samples: "samples.tsv"
chunks: ["001", "002", "003"]

# Reference genome and annotation paths
reference:
  genome_dir: "/path/to/genome/STAR_index"        # Path to STAR genome index
  genome_fasta: "/path/to/genome/genome.fa.gz"    # Genome FASTA file
  gtf: "/path/to/genome/annotation.gtf"           # GTF annotation file
  rsem_index: "/path/to/genome/RSEM_index"        # RSEM index directory
  rsem_index_name: "species_name"                 # Base name for RSEM index files (without extension)

# Output directories
output_dir: "results"
logs_dir: "logs"

# Tool parameters
fastqc:
  threads: 8
  mem_gb: 8

fastp:
  threads: 8
  mem_gb: 32
  # Fastp quality and adapter trimming parameters - base params for both data types
  base_params: >-
    --length_required 75
    --cut_front
    --cut_tail
    --trim_poly_g
  # Paired-end specific parameters
  paired_params: ""
  # Single-end specific parameters
  single_params: ""

sortmerna:
  mem_gb: 50
  threads: 4
  # SortMeRNA database path
  database: "/path/to/tools/sortmeRNA/smr_v4.3_default_db.fasta"
  env: "/path/to/envs/sortmerna_v4"
  # Speed optimisation for rRNA depletion:
  # --no-best: disables exhaustive search for the best alignment across all references.
  #            For rRNA depletion we only need to know WHETHER a read is rRNA, not
  #            which reference it matches best.
  # --num_alignments 1: stop after finding the first passing alignment.
  extra_params: "--no-best --num_alignments 1"

multiqc:
  mem_gb: 4
  threads: 8

star:
  threads: 8
  mem_gb: 32
  # NOTE: extra_params is used for paired-end data (star_align_pe).
  # For single-end data (star_align_se), --quantTranscriptomeBan is omitted entirely
  # because IndelSoftclipSingleend bans unpaired mate alignments, which would remove
  # ALL reads from a single-end transcriptome BAM and break RSEM.
  extra_params: >-
    --outSAMtype BAM SortedByCoordinate
    --outFilterMultimapNmax 20
    --outFilterMismatchNoverReadLmax 1.00
    --outFilterMismatchNmax 999
    --quantTranscriptomeBan IndelSoftclipSingleend
    --quantMode TranscriptomeSAM GeneCounts
    --readFilesCommand zcat

rsem:
  threads: 8
  mem_gb: 48
  # RSEM strandedness: none, forward, reverse
  strandedness: "forward"  # Update based on your library prep
  extra_params: >-
    --alignments
    --estimate-rspd
    --no-bam-output
    --calc-ci
    --ci-memory 32000

# Module loading for Metacentrum
modules:
  loadmodules: "source /cvmfs/software.metacentrum.cz/modulefiles/5.1.0/loadmodules"
  mambaforge: "module add mambaforge"
  rsem_env: "mamba activate /path/to/envs/rsem_env"
  star: "mamba activate /path/to/envs/star_2_7_10b"
  fastqc: "mamba activate /path/to/envs/fastqc_v0_12_1"
  multiqc_env: "mamba activate /path/to/envs/multiqc_v1_34"
  sortmerna_env: "mamba activate /path/to/envs/sortmerna_v4"
  seqkit_env: "mamba activate /path/to/envs/seqkit"

# Tool paths (source-compiled binaries, see INSTALL.md)
tools:
  fastp: "/path/to/fastp/fastp"
  rsem_dir: "/path/to/RSEM"
